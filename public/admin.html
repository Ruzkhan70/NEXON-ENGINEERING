    function Toast({ msg, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);

        <div style={{ position: "fixed", bottom: 28, right: 28, zIndex: 9999, background: "linear-gradient(135deg,#00b4d8,#0077b6)", color: "#fff", borderRadius: 12, padding: "14px 22px", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 14, boxShadow: "0 8px 32px rgba(0,119,182,0.35)", display: "flex", alignItems: "center", gap: 10, animation: "slideUp 0.3s ease" }}>
          <Icon name="check" size={16} /> {msg}
        </div>
      );
    }

    // Toggle

          {label && <span style={{ fontSize: 13, color: "#94a3b8" }}>{label}</span>}

    // Field
    function Field({ label, value, onChange, type = "text", rows, placeholder }) {
      const style = { width: "100%", background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, fontFamily: "'DM Sans', sans-serif", outline: "none", boxSizing: "border-box", resize: rows ? "vertical" : undefined };
      return (
        <div style={{ marginBottom: 16 }}>
          {label && <label style={{ display: "block", color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>}
          {rows
            ? <textarea rows={rows} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={style} />
            : <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={style} />
          }
        </div>
      );
    }

    // Image Upload
    function ImageUpload({ label, value, onChange, previewHeight = 160 }) {
      const [dragging, setDragging] = useState(false);
      const [tab, setTab] = useState("upload");
      const [urlInput, setUrlInput] = useState(value && !value.startsWith("data:") ? value : "");
      const inputRef = useRef();

      const handleFile = (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (e) => onChange(e.target.result);
        reader.readAsDataURL(file);
      };

      const handleDrop = (e) => {
        e.preventDefault(); setDragging(false);
        handleFile(e.dataTransfer.files[0]);
      };

      const handleUrlApply = () => { if (urlInput.trim()) onChange(urlInput.trim()); };
      const clear = () => { onChange(""); setUrlInput(""); };

      return (
        <div style={{ marginBottom: 20 }}>

                <button onClick={handleUrlApply} style={{ padding: "10px 18px", background: "linear-gradient(135deg,#0077b6,#00b4d8)", color: "#fff", border: "none", borderRadius: 8, fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Apply</button>

              {value && <img src={value} alt="preview" style={{ width: "100%", height: previewHeight, objectFit: "cover", borderRadius: 10, marginTop: 10 }} onError={e => e.target.style.display = "none"} />}
            </div>
          )}
        </div>
      );
    }

    // Main App
    function App() {
      // Clear old localStorage on first load
      useEffect(() => {
        localStorage.removeItem('nexon_admin_data');
      }, []);
      
      const [authed, setAuthed] = useState(() => {
        const s = load("nexon_session", null);
        return s && (Date.now() - s.time < 8 * 3600000);
      });
      
      const [activeTab, setActiveTab] = useState("dashboard");
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [toast, setToast] = useState(null);
      const [site, setSite] = useState(() => load("nexon_site", DEFAULT_SITE));
      const [projects, setProjects] = useState(() => {
        const data = load("nexon_projects", DEFAULT_PROJECTS);
        return Array.isArray(data) ? data : DEFAULT_PROJECTS;
      });
      const [clients, setClients] = useState(() => {
        const data = load("nexon_clients", DEFAULT_CLIENTS);
        return Array.isArray(data) ? data : DEFAULT_CLIENTS;
      });
      const [messages, setMessages] = useState(() => {
        const data = load("nexon_messages", DEFAULT_MESSAGES);
        return Array.isArray(data) ? data : DEFAULT_MESSAGES;
      });
      const [services, setServices] = useState(() => {
        const data = load("nexon_services", DEFAULT_SERVICES);
        return Array.isArray(data) ? data : DEFAULT_SERVICES;
      });
      const [credentials, setCredentials] = useState(() => load("nexon_credentials", { username: "admin", hash: "aa28d6e3b8d8c0c7c25a276094af8ed1667d265bc20ef3239341fb2dff646933" }));
      
      // Auto-logout after 2 minutes of inactivity
      const [logoutWarning, setLogoutWarning] = useState(false);
      const [logoutCountdown, setLogoutCountdown] = useState(30);
      
      useEffect(() => {
        if (!authed) return;
        let idleTimer, warningTimer, countdownInterval;
        
        const resetTimer = () => {
          clearTimeout(idleTimer);
          clearTimeout(warningTimer);
          clearInterval(countdownInterval);
          setLogoutWarning(false);
          setLogoutCountdown(30);
          
          // Show warning after 90 seconds (1.5 min of 2 min total)
          warningTimer = setTimeout(() => {
            setLogoutWarning(true);
            setLogoutCountdown(30);
            countdownInterval = setInterval(() => {
              setLogoutCountdown(prev => {
                if (prev <= 1) {
                  clearInterval(countdownInterval);
                  localStorage.removeItem("nexon_session");
                  setAuthed(false);
                  return 0;
                }
                return prev - 1;
              });
            }, 1000);
          }, 90000); // 90 seconds = 1.5 minutes
          
          // Auto logout after 2 minutes
          idleTimer = setTimeout(() => {
            clearInterval(countdownInterval);
            localStorage.removeItem("nexon_session");
            setAuthed(false);
          }, 120000); // 2 minutes
        };
        
        const events = ['mousedown', 'keydown', 'scroll', 'touchstart'];
        events.forEach(e => window.addEventListener(e, resetTimer));
        resetTimer();
        
        return () => {
          clearTimeout(idleTimer);
          clearTimeout(warningTimer);
          clearInterval(countdownInterval);
          events.forEach(e => window.removeEventListener(e, resetTimer));
        };
      }, [authed]);

      const stayLoggedIn = () => {
        setLogoutWarning(false);
        setLogoutCountdown(30);
      };

      const showToast = (msg) => setToast(msg);
      const persistSite = (s) => { setSite(s); save("nexon_site", s); };
      const persistProjects = (p) => { setProjects(p); save("nexon_projects", p); };
      const persistClients = (c) => { setClients(c); save("nexon_clients", c); };
      const persistMessages = (m) => { setMessages(m); save("nexon_messages", m); };
      const persistServices = (s) => { setServices(s); save("nexon_services", s); };
      const persistCredentials = (c) => { setCredentials(c); save("nexon_credentials", c); };
      const logout = () => { 
        localStorage.removeItem("nexon_session"); 
        setAuthed(false); 
      };

      if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

      // Logout warning modal
      if (logoutWarning) {
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
            <div style={{ background: "#0f172a", borderRadius: 16, padding: 32, maxWidth: 400, width: "90%", textAlign: "center", border: "1px solid #1e3a5f" }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: "rgba(248,113,113,0.2)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
              </div>
              <h3 style={{ color: "#f87171", fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Session Expiring</h3>
              <p style={{ color: "#94a3b8", marginBottom: 24, lineHeight: 1.6 }}>You will be logged out in <span style={{ color: "#00b4d8", fontWeight: 700 }}>{logoutCountdown}</span> seconds due to inactivity.</p>
              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={stayLoggedIn} style={{ flex: 1, padding: "12px 20px", borderRadius: 10, border: "1px solid #1e3a5f", background: "rgba(30,58,95,0.5)", color: "#e2e8f0", fontWeight: 600, cursor: "pointer" }}>Stay Logged In</button>
                <button onClick={logout} style={{ flex: 1, padding: "12px 20px", borderRadius: 10, border: "none", background: "#ef4444", color: "#fff", fontWeight: 600, cursor: "pointer" }}>Log Out</button>
              </div>
            </div>
          </div>
        );
      }

      const unreadCount = messages.filter(m => !m.read).length;
      const navItems = [
        { id: "dashboard", label: "Dashboard", icon: "dashboard" },
        { id: "pages", label: "Pages", icon: "pages" },
        { id: "services", label: "Services", icon: "services" },
        { id: "projects", label: "Projects", icon: "projects" },
        { id: "clients", label: "Clients", icon: "clients" },
        { id: "messages", label: "Messages", icon: "messages", badge: unreadCount },
        { id: "settings", label: "Settings", icon: "settings" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#020917", fontFamily: "'DM Sans', sans-serif", display: "flex" }}>
          {/* SIDEBAR */}
          <div style={{ width: sidebarOpen ? 260 : 72, minHeight: "100vh", background: "#060e1f", borderRight: "1px solid #0d2340", transition: "width 0.3s", overflow: "hidden", display: "flex", flexDirection: "column", flexShrink: 0, position: "sticky", top: 0, height: "100vh" }}>
            <div style={{ padding: "18px 16px", borderBottom: "1px solid #0d2340", display: "flex", alignItems: "center", gap: 12 }}>
              {site.logo ? (
                <img src={site.logo} alt="logo" style={{ width: 38, height: 38, borderRadius: 10, objectFit: "contain", background: "#0f172a", flexShrink: 0, padding: 3 }} onError={e => { e.target.style.display="none"; }} />
              ) : (
                <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg,#0077b6,#00b4d8)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18" /></svg>
                </div>
              )}
              {sidebarOpen && (
                <div style={{ overflow: "hidden" }}>
                  <div style={{ color: "#e2e8f0", fontWeight: 800, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 180 }}>{site.companyName.length > 18 ? "Nexon CMS" : site.companyName}</div>
                  <div style={{ color: "#475569", fontSize: 11, whiteSpace: "nowrap" }}>Admin Panel</div>
                </div>
              )}
            </div>
            <nav style={{ flex: 1, padding: "16px 12px", overflowY: "auto" }}>
              {navItems.map(n => (
                <button key={n.id} className={`nav-item${activeTab === n.id ? " active" : ""}`} onClick={() => setActiveTab(n.id)}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderRadius: 10, color: "#64748b", background: "none", border: "none", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 14, marginBottom: 4, cursor: "pointer", textAlign: "left", position: "relative" }}>
                  <Icon name={n.icon} size={18} style={{ flexShrink: 0 }} />
                  {sidebarOpen && <span style={{ whiteSpace: "nowrap" }}>{n.label}</span>}
                  {n.badge > 0 && <span style={{ marginLeft: "auto", background: "#f87171", color: "#fff", fontSize: 10, fontWeight: 800, borderRadius: 20, padding: "2px 7px", minWidth: 18, textAlign: "center" }}>{n.badge}</span>}
                </button>
              ))}
            </nav>
            <div style={{ padding: "16px 12px", borderTop: "1px solid #0d2340" }}>
              <button onClick={logout} className="nav-item" style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderRadius: 10, color: "#64748b", background: "none", border: "none", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
                <Icon name="logout" size={18} />
                {sidebarOpen && <span>Logout</span>}
              </button>
            </div>
          </div>

          {/* MAIN */}
          <div style={{ flex: 1, overflow: "auto" }}>
            <div style={{ background: "rgba(6,14,31,0.8)", backdropFilter: "blur(12px)", borderBottom: "1px solid #0d2340", padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100 }}>

                <div><h2 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 18 }}>{navItems.find(n => n.id === activeTab)?.label}</h2></div>

    // Messages Tab
    function MessagesTab({ messages, setMessages, showToast }) {
      const [active, setActive] = useState(null);
      const [filter, setFilter] = useState("all");
      const [demoForm, setDemoForm] = useState({ name: "", email: "", message: "" });

      const markRead = (id) => setMessages(messages.map(m => m.id === id ? { ...m, read: true } : m));
      const deleteMsg = (id) => { setMessages(messages.filter(m => m.id !== id)); setActive(null); showToast("Message deleted."); };

      const sendDemo = () => {
        if (!demoForm.name || !demoForm.message) return;
        const newMsg = { id: Date.now(), ...demoForm, date: new Date().toISOString().split("T")[0], read: false };
        setMessages([newMsg, ...messages]);
        setDemoForm({ name: "", email: "", message: "" });
        showToast("Demo message received!");
      };

      return (
        <div>
          <h1 className="section-title">Messages</h1>

              <h4 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 14, marginBottom: 14 }}>📨 Simulate Contact Form</h4>

              <Field label="Email" value={demoForm.email} onChange={v => setDemoForm(f => ({ ...f, email: v }))} placeholder="visitor@email.com" />
              <Field label="Message" value={demoForm.message} onChange={v => setDemoForm(f => ({ ...f, message: v }))} rows={2} placeholder="Message..." />

              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {["all", "unread", "read"].map(f => (
                  <button key={f} onClick={() => setFilter(f)} style={{ padding: "6px 14px", borderRadius: 8, background: filter === f ? "rgba(0,180,216,0.2)" : "none", border: `1px solid ${filter === f ? "rgba(0,180,216,0.5)" : "#1e3a5f"}`, color: filter === f ? "#00b4d8" : "#64748b", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 12, textTransform: "capitalize" }}>{f} ({f === "all" ? messages.length : f === "unread" ? messages.filter(m => !m.read).length : messages.filter(m => m.read).length})</button>
                ))}
              </div>
              <div style={{ maxHeight: 200, overflowY: "auto" }}>
                {filtered.length > 0 ? filtered.map(m => (
                  <div key={m.id} onClick={() => { setActive(m); markRead(m.id); }} style={{ display: "flex", gap: 12, padding: "10px 12px", borderRadius: 8, cursor: "pointer", background: active?.id === m.id ? "rgba(0,180,216,0.1)" : "none", marginBottom: 4, border: `1px solid ${active?.id === m.id ? "rgba(0,180,216,0.2)" : "transparent"}` }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg,#0d2340,#1e3a5f)", display: "flex", alignItems: "center", justifyContent: "center", color: "#00b4d8", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{m.name[0]}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: "#e2e8f0", fontWeight: 600, fontSize: 13 }}>{m.name}</span>
                        {!m.read && <span style={{ width: 6, height: 6, background: "#00b4d8", borderRadius: "50%", display: "inline-block" }} />}
                      </div>
                      <p style={{ color: "#64748b", fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.message}</p>
                    </div>
                    <span style={{ color: "#475569", fontSize: 10 }}>{m.date}</span>
                  </div>
                )) : <p style={{ color: "#64748b", fontSize: 13, textAlign: "center", padding: 20 }}>No messages</p>}
              </div>
            </Card>
          </div>
          {active && (
            <Card>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20 }}>
                <div>
                  <h4 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16 }}>{active.name}</h4>
                  <div style={{ display: "flex", gap: 16, marginTop: 6 }}>
                    <span style={{ color: "#64748b", fontSize: 13 }}>✉ {active.email}</span>
                    <span style={{ color: "#64748b", fontSize: 13 }}>📅 {active.date}</span>
                  </div>
                </div>
                <button className="btn-danger" onClick={() => deleteMsg(active.id)}><Icon name="trash" size={13} /> Delete</button>
              </div>
              <div style={{ background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 10, padding: 20 }}>
                <p style={{ color: "#94a3b8", lineHeight: 1.7, fontSize: 14 }}>{active.message}</p>
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
                <a href={`mailto:${active.email}`} className="btn-primary" style={{ display: "inline-flex", alignItems: "center", gap: 6, textDecoration: "none", padding: "10px 18px", borderRadius: 10 }}>Reply via Email</a>
              </div>
            </Card>
          )}
        </div>
      );
    }

    // Settings Tab
    function SettingsTab({ site, setSite, credentials, setCredentials, showToast }) {
      const [local, setLocal] = useState(site);
      const [newUsername, setNewUsername] = useState(credentials.username);
      const [currentPass, setCurrentPass] = useState("");
      const [newPass, setNewPass] = useState("");
      const [confirmPass, setConfirmPass] = useState("");
      const [credError, setCredError] = useState("");
      const [showCurrent, setShowCurrent] = useState(false);
      const [showNew, setShowNew] = useState(false);

      const saveSite = (section) => { setSite(local); showToast(`${section} settings saved!`); };

      const upd = (path, val) => {
        const keys = path.split(".");
        setLocal(prev => {
          const copy = JSON.parse(JSON.stringify(prev));
          let ref = copy;
          for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
          ref[keys[keys.length - 1]] = val;
          return copy;
        });
      };

      const saveCredentials = () => {
        setCredError("");
        if (!newUsername.trim()) { setCredError("Username cannot be empty."); return; }
        if (!currentPass) { setCredError("Please enter your current password to confirm changes."); return; }
        if (currentPass !== "nexon2025") { setCredError("Current password is incorrect."); return; }
        if (newPass && newPass.length < 6) { setCredError("New password must be at least 6 characters."); return; }
        if (newPass && newPass !== confirmPass) { setCredError("New passwords do not match."); return; }
        setCredentials({ username: newUsername.trim(), hash: newPass ? hashPassword(newPass) : credentials.hash });
        setCurrentPass(""); setNewPass(""); setConfirmPass("");
        showToast("Account credentials updated! 🔐");
      };

      return (
        <div>
          <h1 className="section-title">Settings</h1>
          <p className="section-sub">Control global site configuration, branding, contact details, and account security.</p>
          <div style={{ display: "grid", gap: 24 }}>
            <Card>
              <h3 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16, marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}><Icon name="star" size={16} style={{ color: "#00b4d8" }} /> Branding</h3>
              <Field label="Company Name" value={local.companyName} onChange={v => upd("companyName", v)} />
              <ImageUpload label="Company Logo" value={local.logo} onChange={v => upd("logo", v)} previewHeight={100} />
              <button className="btn-primary" onClick={() => saveSite("Branding")}><Icon name="save" size={14} /> Save Branding</button>
            </Card>
            <Card>
              <h3 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16, marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}><Icon name="dashboard" size={16} style={{ color: "#00b4d8" }} /> Website Statistics</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <Field label="Projects Completed" value={local.stats.projects} onChange={v => upd("stats.projects", v)} placeholder="50+" />
                <Field label="Industrial Clients" value={local.stats.clients} onChange={v => upd("stats.clients", v)} placeholder="30+" />
                <Field label="Years of Experience" value={local.stats.years} onChange={v => upd("stats.years", v)} placeholder="8+" />
                <Field label="Emergency Support" value={local.stats.support} onChange={v => upd("stats.support", v)} placeholder="24/7" />
              </div>
              <button className="btn-primary" onClick={() => saveSite("Statistics")}><Icon name="save" size={14} /> Save Statistics</button>
            </Card>
            <Card>
              <h3 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16, marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}><Icon name="phone" size={16} style={{ color: "#00b4d8" }} /> Contact Information</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <Field label="Phone Number" value={local.contact.phone} onChange={v => upd("contact.phone", v)} />
                <Field label="Email Address" value={local.contact.email} onChange={v => upd("contact.email", v)} />
                <Field label="WhatsApp Number" value={local.contact.whatsapp} onChange={v => upd("contact.whatsapp", v)} />
                <Field label="Facebook URL" value={local.contact.facebook} onChange={v => upd("contact.facebook", v)} />
                <Field label="Instagram URL" value={local.contact.instagram} onChange={v => upd("contact.instagram", v)} />
              </div>
              <Field label="Address" value={local.contact.address} onChange={v => upd("contact.address", v)} rows={2} />
              <div style={{ marginTop: 16, padding: "16px", background: "#0f172a", borderRadius: 12, border: "1px solid #1e3a5f", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <span style={{ color: "#e2e8f0", fontWeight: 600, display: "block", marginBottom: 4 }}>Google Map Location</span>
                  <span style={{ color: "#64748b", fontSize: 12 }}>Show/hide the map on contact page</span>
                </div>
                <Toggle checked={local.contact.locationVisible} onChange={() => upd("contact.locationVisible", !local.contact.locationVisible)} />
              </div>
              <button className="btn-primary" onClick={() => saveSite("Contact")}><Icon name="save" size={14} /> Save Contact Info</button>
            </Card>
            <Card>
              <h3 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16, marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}><Icon name="eye" size={16} style={{ color: "#00b4d8" }} /> Page Visibility Control</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 16 }}>
                {Object.entries(local.pages).map(([pg, d]) => (
                  <div key={pg} style={{ background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 12, padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ color: "#e2e8f0", fontWeight: 600, textTransform: "capitalize" }}>{pg}</span>
                    <Toggle checked={d.visible} onChange={() => upd(`pages.${pg}.visible`, !d.visible)} />
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 16 }}>
                <button className="btn-primary" onClick={() => saveSite("Page Visibility")}><Icon name="save" size={14} /> Save Visibility Settings</button>
              </div>
            </Card>
            <Card>
              <h3 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 16, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}>
                <Icon name="key" size={16} style={{ color: "#00b4d8" }} /> Account Security
              </h3>
              <p style={{ color: "#64748b", fontSize: 13, marginBottom: 24 }}>Change your admin username and/or password.</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div>
                  <label style={{ display: "block", color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 6 }}>New Username</label>
                  <input type="text" value={newUsername} onChange={e => setNewUsername(e.target.value)} style={{ width: "100%", background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ position: "relative" }}>
                  <label style={{ display: "block", color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Current Password <span style={{ color: "#f87171" }}>*</span></label>
                  <input type={showCurrent ? "text" : "password"} value={currentPass} onChange={e => setCurrentPass(e.target.value)} placeholder="Required" style={{ width: "100%", background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 40px 10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  <button onClick={() => setShowCurrent(v => !v)} style={{ position: "absolute", right: 12, top: 34, background: "none", border: "none", color: "#64748b", cursor: "pointer", padding: 0 }}><Icon name={showCurrent ? "eyeOff" : "eye"} size={15} /></button>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 4 }}>
                <div style={{ position: "relative" }}>
                  <label style={{ display: "block", color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 6 }}>New Password <span style={{ color: "#64748b", fontWeight: 400, fontSize: 11 }}>(leave blank)</span></label>
                  <input type={showNew ? "text" : "password"} value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Min. 6 characters" style={{ width: "100%", background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 40px 10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  <button onClick={() => setShowNew(v => !v)} style={{ position: "absolute", right: 12, top: 34, background: "none", border: "none", color: "#64748b", cursor: "pointer", padding: 0 }}><Icon name={showNew ? "eyeOff" : "eye"} size={15} /></button>
                </div>
                <div>
                  <label style={{ display: "block", color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Confirm Password</label>
                  <input type="password" value={confirmPass} onChange={e => setConfirmPass(e.target.value)} placeholder="Repeat" style={{ width: "100%", background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
              </div>
              {credError && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(248,113,113,0.1)", border: "1px solid rgba(248,113,113,0.25)", borderRadius: 8, color: "#f87171", fontSize: 13 }}>⚠ {credError}</div>}
              <div style={{ marginTop: 20 }}>
                <button className="btn-primary" onClick={saveCredentials} style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><Icon name="key" size={14} /> Update Credentials</button>
              </div>
            </Card>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
